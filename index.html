<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专属人格测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system}
body{background:#f8edf2;padding:20px;min-height:100vh}
.box{max-width:520px;margin:0 auto;background:#fff;border-radius:22px;padding:28px;box-shadow:0 8px 30px rgba(210,100,140,0.12)}
h1{text-align:center;color:#d16b92;font-size:22px;margin-bottom:30px;font-weight:600}
.question{margin-bottom:22px}
.question-title{font-size:16px;color:#333;margin-bottom:12px;font-weight:500}
.option-list{display:flex;gap:10px;flex-wrap:wrap}
.option{background:#f3e6ec;border-radius:12px;padding:11px 18px;cursor:pointer;transition:0.2s}
.option.active{background:#d16b92;color:#fff}
button{width:100%;border:none;background:linear-gradient(90deg,#e878a8,#d16b92);color:#fff;padding:14px;border-radius:14px;font-size:17px;margin-top:10px;cursor:pointer}
.result{margin-top:25px;text-align:center;font-size:20px;color:#d16b92;font-weight:600;display:none;padding:15px;border-radius:12px;background:#f8edf2}
</style>
</head>
<body>
<div class="box">
<h1>你的专属人格匹配测试</h1>

<div class="question">
<div class="question-title">1. 你的家乡在哪？</div>
<div class="option-list">
<div class="option" onclick="choose(this,'q1')">献县</div>
<div class="option" onclick="choose(this,'q1')">美国</div>
</div>
</div>

<div class="question">
<div class="question-title">2. 你高中在哪里毕业？</div>
<div class="option-list">
<div class="option" onclick="choose(this,'q2')">献县第一中学</div>
<div class="option" onclick="choose(this,'q2')">清华大学附属中学</div>
</div>
</div>

<div class="question">
<div class="question-title">3. 你的身高是多少？</div>
<div class="option-list">
<div class="option" onclick="choose(this,'q3')">160-170</div>
<div class="option" onclick="choose(this,'q3')">170-180</div>
</div>
</div>

<div class="question">
<div class="question-title">4. 你最想成为谁？</div>
<div class="option-list">
<div class="option" onclick="choose(this,'q4')">张元英</div>
<div class="option" onclick="choose(this,'q4')">我自己</div>
</div>
</div>

<div class="question">
<div class="question-title">5. 1+1=？</div>
<div class="option-list">
<div class="option" onclick="choose(this,'q5')">2</div>
<div class="option" onclick="choose(this,'q5')">0</div>
</div>
</div>

<button onclick="showResult()">查看我的匹配结果</button>
<div class="result" id="res"></div>
</div>

<script>
let select={};
function choose(el,name){
document.querySelectorAll('.'+name).forEach(e=>e.classList.remove('active'));
el.classList.add('active');
select[name]=el.innerText;
}
function showResult(){
const arr=["张靖涵","赵雅涵","刘硕","刘瑶","王梦涵","赵英坤","吕心茹","范畅"];
const rnd=arr[Math.floor(Math.random()*arr.length)];
document.getElementById('res').innerText="✨你的专属匹配人物："+rnd;
document.getElementById('res').style.display='block';
}
</script>
</body>
</html>
