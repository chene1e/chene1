<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属人格测试</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background-color: #f9f3f9;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #d885a3;
            margin-bottom: 30px;
        }
        .question {
            margin-bottom: 25px;
        }
        .question p {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        .options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .options label {
            background: #f5e1e8;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #d885a3;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            margin-top: 20px;
            cursor: pointer;
        }
        button:hover {
            background: #c76b8f;
        }
        .result {
            text-align: center;
            margin-top: 30px;
            font-size: 22px;
            font-weight: bold;
            color: #c76b8f;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>专属人格测试</h1>
        
        <!-- 第1题 -->
        <div class="question">
            <p>1. 你的家乡在哪？</p>
            <div class="options">
                <label><input type="radio" name="q1" value="献县" required> 献县</label>
                <label><input type="radio" name="q1" value="美国"> 美国</label>
            </div>
        </div>

        <!-- 第2题 -->
        <div class="question">
            <p>2. 你高中在哪里毕业？</p>
            <div class="options">
                <label><input type="radio" name="q2" value="献县第一中学"> 献县第一中学</label>
                <label><input type="radio" name="q2" value="清华大学附属中学"> 清华大学附属中学</label>
            </div>
        </div>

        <!-- 第3题 -->
        <div class="question">
            <p>3. 你的身高是多少？</p>
            <div class="options">
                <label><input type="radio" name="q3" value="160-170"> 160-170</label>
                <label><input type="radio" name="q3" value="170-180"> 170-180</label>
            </div>
        </div>

        <!-- 第4题 -->
        <div class="question">
            <p>4. 你最想成为谁？</p>
            <div class="options">
                <label><input type="radio" name="q4" value="张元英"> 张元英</label>
                <label><input type="radio" name="q4" value="我自己"> 我自己</label>
            </div>
        </div>

        <!-- 第5题 -->
        <div class="question">
            <p>5. 1+1=？</p>
            <div class="options">
                <label><input type="radio" name="q5" value="2"> 2</label>
                <label><input type="radio" name="q5" value="0"> 0</label>
            </div>
        </div>

        <button onclick="getResult()">生成测试结果</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        function getResult() {
            // 结果名单（完全按你要求）
            const names = ["张靖涵", "赵雅涵", "刘硕", "刘瑶", "王梦涵", "赵英坤", "吕心茹", "范畅"];
            // 随机生成
            const randomIndex = Math.floor(Math.random() * names.length);
            const result = names[randomIndex];
            
            // 显示结果
            document.getElementById("result").innerText = "你的测试结果是：" + result;
            document.getElementById("result").style.display = "block";
        }
    </script>
</body>
</html>
