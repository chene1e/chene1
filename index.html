<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人格测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#f8edf2;padding:20px;}
.container{
max-width:500px;margin:0 auto;background:white;
padding:30px;border-radius:22px;box-shadow:0 8px 30px rgba(210,100,140,0.12);
}
h1{text-align:center;color:#d16b92;margin-bottom:30px;font-size:22px}
.question{margin-bottom:24px}
.title{font-weight:500;margin-bottom:10px;color:#333}
.options{display:flex;gap:10px;flex-wrap:wrap}
.option{
background:#f3e6ec;padding:10px 16px;border-radius:12px;
cursor:pointer;transition:.2s;
}
.option.active{background:#d16b92;color:white}
.submit{
width:100%;background:linear-gradient(90deg,#e878a8,#d16b92);
color:white;border:none;padding:14px;border-radius:14px;
font-size:17px;cursor:pointer;margin-top:10px;
}
</style>
</head>
<body>
<div class="container">
<h1>答题中...</h1>

<div class="question">
<div class="title">1. 你的家乡在哪？</div>
<div class="options">
<div class="option" onclick="set(this,'q1')">献县</div>
<div class="option" onclick="set(this,'q1')">美国</div>
</div>
</div>

<div class="question">
<div class="title">2. 你高中在哪里毕业？</div>
<div class="options">
<div class="option" onclick="set(this,'q2')">献县第一中学</div>
<div class="option" onclick="set(this,'q2')">清华大学附属中学</div>
</div>
</div>

<div class="question">
<div class="title">3. 你的身高是多少？</div>
<div class="options">
<div class="option" onclick="set(this,'q3')">160-170</div>
<div class="option" onclick="set(this,'q3')">170-180</div>
</div>
</div>

<div class="question">
<div class="title">4. 你最想成为谁？</div>
<div class="options">
<div class="option" onclick="set(this,'q4')">张元英</div>
<div class="option" onclick="set(this,'q4')">我自己</div>
</div>
</div>

<div class="question">
<div class="title">5. 1+1=？</div>
<div class="options">
<div class="option" onclick="set(this,'q5')">2</div>
<div class="option" onclick="set(this,'q5')">0</div>
</div>
</div>

<button class="submit" onclick="goResult()">查看结果</button>
</div>

<script>
let sel = {}
function set(el, name){
document.querySelectorAll(`[onclick="set(this,'${name}')"]`).forEach(e=>e.classList.remove('active'))
el.classList.add('active')
sel[name] = el.innerText
}
function goResult(){
localStorage.result = JSON.stringify([
"张靖涵","赵雅涵","刘硕","刘瑶","王梦涵","赵英坤","吕心茹","范畅"
][Math.floor(Math.random()*8)])
location.href='result.html'
}
</script>
</body>
</html>
